# Gang pipeline — FLUENCE SCHEDULER (producer/consumer gang, quantum-aware)
#
# An indexed Job of N identical pods in one group with coordination=shared. The
# Fluence webhook promotes completion index 0 to the PRODUCER (real QPU submit +
# sidecar, role=producer, not gated) and gates the other N-1 as CONSUMERS
# (role=consumer, handed the producer's task id as FLUENCE_QUANTUM_JOB_ID at
# ungate). Consumers are SchedulingGated until the QPU task reaches queue
# position ~1, so they hold NO classical node during the queue wait — i.e. ~0
# idle. That reclaimed idle (vs the default arm) is exactly what this experiment
# measures.
#
# Backend is annotation-driven: the pods request the qpu resource and Fluence
# injects the matched device as FLUXION_ARN (require-backend pins the NAME; the
# experiment never names an ARN here). require-qrmi_type keeps a gate circuit off
# analog devices.
#
# The pod template is byte-identical across pods; the producer/consumer role is
# derived from the Job's completion index by the webhook — the user authors no
# roles and no separate submitter pod.
apiVersion: batch/v1
kind: Job
metadata:
  name: qaoa-gang                          # patched: run name
  labels:
    app: quantum-braket-gang
spec:
  completionMode: Indexed
  completions: 5                           # patched: N (1 producer + N-1 consumers)
  parallelism: 5                           # patched: N
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: quantum-braket-gang
        fluence.flux-framework.org/group: qaoa-gang   # patched: run name
      annotations:
        fluence.flux-framework.org/coordination: shared
        fluence.flux-framework.org/group-size: "5"    # patched: N
        fluence.flux-framework.org/require-backend: sv1  # patched: backend NAME
        fluence.flux-framework.org/require-qrmi_type: braket-gate
    spec:
      schedulerName: fluence
      restartPolicy: Never
      containers:
        - name: gang
          image: ghcr.io/converged-computing/quantum-braket-gang:latest
          imagePullPolicy: Always
          env:
            # No BRAKET_DEVICE: Fluence places the quantum work and injects
            # FLUXION_ARN, which gang.py reads in preference. FLUENCE_COORDINATION_ROLE
            # and (for consumers) FLUENCE_QUANTUM_JOB_ID are injected by the webhook.
            - name: RUN_ID
              value: "qaoa-gang"           # patched: unique per run
            - name: N_CONSUMERS
              value: "4"                   # patched: N-1
            - name: N_SHOTS
              value: "1000"                # patched
            - name: N_NODES
              value: "10"                  # patched
            - name: K_REGULAR
              value: "3"
            - name: SEED
              value: "42"                  # patched
            - name: P_LAYERS
              value: "1"
            - name: POLL_TIMEOUT_S
              value: "2592000"             # Braket result poll bound (30d) — QPU queues are long
            - name: AWS_ACCESS_KEY_ID
              valueFrom: {secretKeyRef: {name: aws-braket-credentials, key: AWS_ACCESS_KEY_ID}}
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom: {secretKeyRef: {name: aws-braket-credentials, key: AWS_SECRET_ACCESS_KEY}}
            - name: AWS_DEFAULT_REGION
              valueFrom: {secretKeyRef: {name: aws-braket-credentials, key: AWS_DEFAULT_REGION}}
          resources:
            requests: {fluxion.flux-framework.org/qpu: "1", cpu: "200m", memory: "512Mi"}
            limits:   {fluxion.flux-framework.org/qpu: "1", cpu: "1000m", memory: "2Gi"}
