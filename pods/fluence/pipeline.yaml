apiVersion: v1
kind: Pod
metadata:
  name: qaoa-pipeline
  labels:
    app: quantum-braket
    fluence.io/group: qaoa-pipeline
spec:
  restartPolicy: Never

  schedulerName: fluence

  initContainers:
    - name: problem-generator
      image: ghcr.io/converged-computing/quantum-braket-problem-generator:latest
      imagePullPolicy: IfNotPresent
      env:
        - name: N_NODES
          value: "10"
        - name: K_REGULAR
          value: "3"
        - name: SEED
          value: "42"
        - name: WORKSPACE
          value: /workspace
      volumeMounts:
        - name: workspace
          mountPath: /workspace
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "256Mi"

    - name: transpiler
      image: ghcr.io/converged-computing/quantum-braket-transpiler:latest
      imagePullPolicy: IfNotPresent
      env:
        - name: P_LAYERS
          value: "1"
        - name: WORKSPACE
          value: /workspace
      volumeMounts:
        - name: workspace
          mountPath: /workspace
      resources:
        requests:
          cpu: "200m"
          memory: "256Mi"
        limits:
          cpu: "1000m"
          memory: "512Mi"

    - name: braket-gateway
      image: ghcr.io/converged-computing/quantum-braket-gateway:latest
      imagePullPolicy: IfNotPresent
      env:
        - name: WORKSPACE
          value: /workspace
        - name: ITERATION
          value: "0"
        - name: N_SHOTS
          value: "1000"
        # BRAKET_DEVICE is injected as FLUXION_ARN by the Fluence webhook
        # FLUXION_QRMI_TYPE is also injected (braket-gate or braket-ahs)
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws-braket-credentials
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-braket-credentials
              key: AWS_SECRET_ACCESS_KEY
        - name: AWS_DEFAULT_REGION
          valueFrom:
            secretKeyRef:
              name: aws-braket-credentials
              key: AWS_DEFAULT_REGION
      volumeMounts:
        - name: workspace
          mountPath: /workspace
      resources:
        requests:
          cpu: "200m"
          memory: "512Mi"
        limits:
          cpu: "1000m"
          memory: "4Gi"

  containers:
    - name: optimizer
      image: ghcr.io/converged-computing/quantum-braket-optimizer:latest
      imagePullPolicy: IfNotPresent
      # Request a gate-simulator QPU resource from the Fluence graph.
      # Fluence will only match this to a backend with type: gate-simulator.
      # An AHS backend (QuEra Aquila) will never be selected.
      resources:
        limits:
          fluxion.flux-framework.org/gate-simulator: "1"
      env:
        - name: WORKSPACE
          value: /workspace
        - name: MAX_ITER
          value: "50"
        - name: TOL
          value: "1e-4"
        - name: GATEWAY_MODE
          value: "subprocess"
        - name: N_SHOTS
          value: "1000"
        # BRAKET_DEVICE is injected as FLUXION_ARN by the Fluence webhook
        # FLUXION_QRMI_TYPE is also injected (braket-gate or braket-ahs)
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws-braket-credentials
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-braket-credentials
              key: AWS_SECRET_ACCESS_KEY
        - name: AWS_DEFAULT_REGION
          valueFrom:
            secretKeyRef:
              name: aws-braket-credentials
              key: AWS_DEFAULT_REGION
      volumeMounts:
        - name: workspace
          mountPath: /workspace
      resources:
        requests:
          cpu: "500m"
          memory: "512Mi"
        limits:
          cpu: "2000m"
          memory: "4Gi"

  volumes:
    - name: workspace
      emptyDir: {}
