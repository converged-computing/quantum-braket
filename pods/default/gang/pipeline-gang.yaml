# Gang pipeline — DEFAULT scheduler (native gang, no Fluence)  [BASELINE]
#
# The same N-pod producer/consumer gang, but scheduled all-at-once by the default
# scheduler via a native scheduling.k8s.io/v1alpha2 PodGroup (all-or-nothing).
# There is NO Fluence, so:
#   - the producer/consumer role is derived from the Job completion index
#     (index 0 = producer), not injected;
#   - the producer names its device MANUALLY via BRAKET_DEVICE (no Fluxion to
#     inject FLUXION_ARN) — this is exactly what Fluence spares you in the other
#     arm, where you set only a backend NAME annotation;
#   - nothing gates the consumers: all N pods start together, and the N-1
#     consumers idle (burning classical node-time) while the QPU queue drains.
#     They discover the producer's task id from S3 (the producer publishes it).
#
# That wasted consumer idle is the baseline the Fluence arm reclaims.
apiVersion: scheduling.k8s.io/v1alpha2
kind: PodGroup
metadata:
  name: qaoa-gang-default                  # patched: <run>-pg
spec:
  schedulingPolicy:
    gang:
      minCount: 5                          # patched: N (all-or-nothing)
---
apiVersion: batch/v1
kind: Job
metadata:
  name: qaoa-gang                          # patched: run name
  labels:
    app: quantum-braket-gang
spec:
  completionMode: Indexed
  completions: 5                           # patched: N
  parallelism: 5                           # patched: N
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: quantum-braket-gang
    spec:
      # Default scheduler (native gang via the PodGroup). No schedulerName.
      schedulingGroup:
        podGroupName: qaoa-gang-default     # patched: <run>-pg
      restartPolicy: Never
      containers:
        - name: gang
          image: ghcr.io/converged-computing/quantum-braket-gang:latest
          imagePullPolicy: Always
          env:
            # No FLUENCE_COORDINATION_ROLE: without Fluence, gang.py derives the
            # role from JOB_COMPLETION_INDEX (0 = producer). No fluxion qpu
            # request either — the default scheduler doesn't understand it.
            - name: BRAKET_DEVICE
              value: "arn:aws:braket:::device/quantum-simulator/amazon/sv1"  # patched: --device-arn
            - name: RUN_ID
              value: "qaoa-gang"            # patched: unique per run
            - name: N_CONSUMERS
              value: "4"                    # patched: N-1
            - name: N_SHOTS
              value: "1000"                 # patched
            - name: N_NODES
              value: "10"                   # patched
            - name: K_REGULAR
              value: "3"
            - name: SEED
              value: "42"                   # patched
            - name: P_LAYERS
              value: "1"
            - name: CONSUMER_TIMEOUT_S
              value: "0"                    # patched: <=0 = wait indefinitely (QPU queue is the phenomenon)
            - name: POLL_TIMEOUT_S
              value: "2592000"              # Braket result poll bound (30d)
            - name: AWS_ACCESS_KEY_ID
              valueFrom: {secretKeyRef: {name: aws-braket-credentials, key: AWS_ACCESS_KEY_ID}}
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom: {secretKeyRef: {name: aws-braket-credentials, key: AWS_SECRET_ACCESS_KEY}}
            - name: AWS_DEFAULT_REGION
              valueFrom: {secretKeyRef: {name: aws-braket-credentials, key: AWS_DEFAULT_REGION}}
          resources:
            requests: {cpu: "200m", memory: "512Mi"}
            limits:   {cpu: "1000m", memory: "2Gi"}
