# smoke.yaml — minimal check that the Fluence STANDALONE quantum path works end
# to end for the selection experiment, with NO cost (the command is a sleep, so
# nothing is submitted to a backend).
#
# This experiment uses standalone quantum pods (no group label, no role, no
# gating). Per the current Fluence model, a quantum pod with no group label is
# scheduled standalone: Fluence matches it against the resource graph, injects
# the matched backend as FLUXION_BACKEND (+ FLUXION_<attr>, e.g. FLUXION_ARN),
# stages the Python interceptor, and lets the pod run immediately (it is NOT
# gated, because there are no workers to coordinate).
#
# What to verify after `kubectl apply -f smoke.yaml`:
#   1. the pod is NOT gated (runs straight away — no quantum.braket/ready gate):
#        kubectl get pod sel-smoke -o jsonpath='{.spec.schedulingGates}'   # -> empty
#   2. Fluence injected the matched backend env:
#        kubectl exec sel-smoke -c sampler -- printenv FLUXION_BACKEND       # -> e.g. sv1
#        kubectl exec sel-smoke -c sampler -- printenv FLUXION_ARN           # -> device ARN
#   3. the interceptor was staged (init container present) + PYTHONPATH set:
#        kubectl get pod sel-smoke -o jsonpath='{.spec.initContainers[*].name}'  # includes fluence-stage
#        kubectl exec sel-smoke -c sampler -- printenv PYTHONPATH            # -> /opt/fluence-staged
#
# To smoke-test CLIENT-SIDE selection too, submit through the plugin instead:
#        kubectl fluence apply -f smoke.yaml --attributes cost-attributes.yaml
#   then confirm the require-backend pin was stamped:
#        kubectl get pod sel-smoke -o jsonpath='{.metadata.annotations.fluence\.flux-framework\.org/require-backend}'
#
# Cleanup:  kubectl delete -f smoke.yaml
#
# NOTE: the pod requests the QPU resource (fluxion.flux-framework.org/qpu) so
# Fluence's quantum + fluxion handlers engage — that request is what triggers the
# standalone interceptor/env path. No task is ever submitted (the command is a
# sleep), so this costs nothing.
---
apiVersion: v1
kind: Pod
metadata:
  name: sel-smoke
  labels:
    app: sel-smoke
  # Add the select-* annotations below (and submit via `kubectl fluence apply`)
  # to also smoke-test client-side selection. Left off here so a plain
  # `kubectl apply` exercises the capability-only (baseline) path.
  # annotations:
  #   fluence.flux-framework.org/select-backend: "braket"
  #   fluence.flux-framework.org/select-policy: "min-cost"
  #   fluence.flux-framework.org/select-candidates: "sv1,dm1,tn1"
spec:
  schedulerName: fluence
  restartPolicy: Never
  containers:
    - name: sampler
      image: busybox:1.36
      command: ["sh", "-c", "echo FLUXION_BACKEND=$FLUXION_BACKEND FLUXION_ARN=$FLUXION_ARN; sleep 600"]
      resources:
        requests:
          fluxion.flux-framework.org/qpu: "1"
        limits:
          fluxion.flux-framework.org/qpu: "1"
