# smoke.yaml — checks the producer/consumer wiring with NO Braket and NO cost.
# A 2-pod Indexed Job (busybox) requesting the qpu resource, coordination=shared.
#
# What Fluence should do (because the pods request the QPU resource and ask for
# shared coordination): promote completion index 0 to the PRODUCER — its own
# group-of-one smoke-producer, NOT gated, FLUENCE_COORDINATION_ROLE=producer — and
# gate completion index 1 as a CONSUMER (FLUENCE_COORDINATION_ROLE=consumer).
# Because busybox never really submits, the consumer stays gated (no task id is
# ever stamped); that is the expected observable here — we are checking role
# assignment + gating, not a Braket round trip.
#
# Verify after `kubectl apply -f smoke.yaml`:
#   kubectl get pods -l job-name=smoke \
#     -o jsonpath='{range .items[*]}{.metadata.annotations.batch\.kubernetes\.io/job-completion-index}{" gates="}{.spec.schedulingGates}{"\n"}{end}'
#     # index 0 -> no gate; index 1 -> quantum.braket/ready gate
#   IDX0=$(kubectl get pods -l job-name=smoke,batch.kubernetes.io/job-completion-index=0 -o jsonpath='{.items[0].metadata.name}')
#   kubectl exec $IDX0 -c gang -- printenv FLUENCE_COORDINATION_ROLE   # producer
#
# Cleanup: kubectl delete -f smoke.yaml ; kubectl delete podgroup smoke smoke-producer --ignore-not-found
---
apiVersion: batch/v1
kind: Job
metadata:
  name: smoke
spec:
  completionMode: Indexed
  parallelism: 2
  completions: 2
  backoffLimit: 0
  template:
    metadata:
      labels:
        fluence.flux-framework.org/group: smoke
      annotations:
        fluence.flux-framework.org/coordination: shared
        fluence.flux-framework.org/require-qrmi_type: braket-gate
    spec:
      schedulerName: fluence
      restartPolicy: Never
      containers:
        - name: gang
          image: busybox:1.36
          command: ["sh", "-c", "echo role=$FLUENCE_COORDINATION_ROLE idx=$JOB_COMPLETION_INDEX; sleep 300"]
          env:
            - name: JOB_COMPLETION_INDEX
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['batch.kubernetes.io/job-completion-index']
          resources:
            requests:
              fluxion.flux-framework.org/qpu: "1"
            limits:
              fluxion.flux-framework.org/qpu: "1"
