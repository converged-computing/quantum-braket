# fluence-resources.yaml — AWS Braket QPU resource graph for Fluence
#
# Schema follows the fluence generic resource-tree format (resources.go):
#   - Each backend is a qdevice vertex attached under the cluster
#   - qdevice carries qpu children which carry qubit children
#   - attributes are defined once in the attributes registry and
#     referenced by name — they are inherited down the tree and become:
#       (a) filterable graph properties the jobspec can constrain on
#       (b) injected env vars (FLUXION_<KEY>) via the mutating webhook
#
# After scheduling a pod, the webhook injects:
#   FLUXION_BACKEND      — matched backend name (e.g. "sv1")
#   FLUXION_VENDOR       — "amazon" or "quera" etc.
#   FLUXION_QRMI_TYPE    — SDK type the gateway uses
#   FLUXION_ARN          — full Braket device ARN
#   FLUXION_REGION       — AWS region
#   FLUXION_CONNECTIVITY — circuit topology hint
#
# Gateway pods read FLUXION_ARN instead of hardcoding BRAKET_DEVICE,
# and FLUXION_QRMI_TYPE to decide which SDK path to use.
#
# Apply with:
#   kubectl apply -f hack/fluence-resources.yaml
#   kubectl rollout restart deployment/fluence -n kube-system
#
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluence-resources
  namespace: kube-system
data:
  resources.yaml: |
    resources:

      # ── Gate simulators ──────────────────────────────────────────────

      - type: qdevice
        name: sv1
        attributes: gate-simulator-sv1
        with:
          - type: qpu
            count: 8
            with:
              - type: qubit
                count: 34

      - type: qdevice
        name: tn1
        attributes: gate-simulator-tn1
        with:
          - type: qpu
            count: 4
            with:
              - type: qubit
                count: 50

      - type: qdevice
        name: dm1
        attributes: gate-simulator-dm1
        with:
          - type: qpu
            count: 4
            with:
              - type: qubit
                count: 17

      # ── Gate QPUs (ordered cheapest per-shot first) ──────────────────

      - type: qdevice
        name: rigetti_cepheus
        attributes: rigetti-cepheus
        with:
          - type: qpu
            count: 1
            with:
              - type: qubit
                count: 108

      - type: qdevice
        name: iqm_garnet
        attributes: iqm-garnet
        with:
          - type: qpu
            count: 1
            with:
              - type: qubit
                count: 20

      - type: qdevice
        name: iqm_emerald
        attributes: iqm-emerald
        with:
          - type: qpu
            count: 1
            with:
              - type: qubit
                count: 20

      - type: qdevice
        name: aqt_ibex
        attributes: aqt-ibex
        with:
          - type: qpu
            count: 1
            with:
              - type: qubit
                count: 20

      - type: qdevice
        name: ionq_forte
        attributes: ionq-forte
        with:
          - type: qpu
            count: 1
            with:
              - type: qubit
                count: 36

      # ── AHS (Analog Hamiltonian Simulation) ──────────────────────────
      # Incompatible with gate circuits. Different qrmi_type ensures
      # the gateway uses the AHS SDK path, not the circuit path.

      - type: qdevice
        name: ahs_local
        attributes: ahs-local
        with:
          - type: qpu
            count: 8
            with:
              - type: qubit
                count: 256

      - type: qdevice
        name: aquila
        attributes: ahs-aquila
        with:
          - type: qpu
            count: 1
            with:
              - type: qubit
                count: 256

    attributes:

      # ── Gate simulators ──────────────────────────────────────────────

      gate-simulator-sv1:
        vendor: amazon
        qrmi_type: braket-gate
        arn: "arn:aws:braket:::device/quantum-simulator/amazon/sv1"
        region: us-east-1
        connectivity: all-to-all
        price_per_min: "0.075"

      gate-simulator-tn1:
        vendor: amazon
        qrmi_type: braket-gate
        arn: "arn:aws:braket:::device/quantum-simulator/amazon/tn1"
        region: us-east-1
        connectivity: sparse-preferred
        price_per_min: "0.275"

      gate-simulator-dm1:
        vendor: amazon
        qrmi_type: braket-gate
        arn: "arn:aws:braket:::device/quantum-simulator/amazon/dm1"
        region: us-east-1
        connectivity: all-to-all
        price_per_min: "0.075"

      # ── Gate QPUs ────────────────────────────────────────────────────

      rigetti-cepheus:
        vendor: rigetti
        qrmi_type: braket-gate
        arn: "arn:aws:braket:us-west-1::device/qpu/rigetti/Cepheus-1-108Q"
        region: us-west-1
        connectivity: heavy-hex
        price_per_task: "0.30"
        price_per_shot: "0.000425"

      iqm-garnet:
        vendor: iqm
        qrmi_type: braket-gate
        arn: "arn:aws:braket:eu-north-1::device/qpu/iqm/Garnet"
        region: eu-north-1
        connectivity: star
        price_per_task: "0.30"
        price_per_shot: "0.00145"

      iqm-emerald:
        vendor: iqm
        qrmi_type: braket-gate
        arn: "arn:aws:braket:eu-north-1::device/qpu/iqm/Emerald"
        region: eu-north-1
        connectivity: star
        price_per_task: "0.30"
        price_per_shot: "0.00160"

      aqt-ibex:
        vendor: aqt
        qrmi_type: braket-gate
        arn: "arn:aws:braket:eu-north-1::device/qpu/aqt/IBEX-Q1"
        region: eu-north-1
        connectivity: all-to-all
        price_per_task: "0.30"
        price_per_shot: "0.02350"

      ionq-forte:
        vendor: ionq
        qrmi_type: braket-gate
        arn: "arn:aws:braket:us-east-1::device/qpu/ionq/Forte-Enterprise-1"
        region: us-east-1
        connectivity: all-to-all
        price_per_task: "0.30"
        price_per_shot: "0.08000"

      # ── AHS ──────────────────────────────────────────────────────────

      ahs-local:
        vendor: amazon
        qrmi_type: braket-ahs
        arn: "local"
        region: local
        connectivity: programmable-2d
        price_per_task: "0.0"
        price_per_shot: "0.0"

      ahs-aquila:
        vendor: quera
        qrmi_type: braket-ahs
        arn: "arn:aws:braket:us-east-1::device/qpu/quera/Aquila"
        region: us-east-1
        connectivity: programmable-2d
        price_per_task: "0.30"
        price_per_shot: "0.01000"
